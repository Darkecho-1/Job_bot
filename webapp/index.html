<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0B0C0F;
            color: #FFFFFF;
            min-height: 100vh;
            padding: 16px 12px 90px;
        }
        .container { max-width: 420px; margin: 0 auto; }

        /* ХЕДЕР */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 16px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #00F0FF, #0088FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions { display: flex; gap: 10px; }
        .header-btn {
            background: #14161D;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 6px 12px;
            color: #7D8293;
            font-size: 16px;
            cursor: pointer;
        }

        /* КАРТОЧКА ПРОФИЛЯ */
        .profile-card {
            background: #14161D;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .profile-card .name { font-size: 18px; font-weight: 700; }
        .profile-card .detail { color: #7D8293; font-size: 13px; margin-top: 2px; }
        .profile-card .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }
        .badge.worker { background: rgba(0,240,255,0.12); color: #00F0FF; }
        .badge.employer { background: rgba(16,185,129,0.12); color: #10B981; }
        .badge.banned { background: rgba(239,68,68,0.12); color: #EF4444; }

        /* СТАТИСТИКА */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-item {
            background: #14161D;
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .stat-item .num { font-size: 20px; font-weight: 700; color: #00F0FF; }
        .stat-item .label { font-size: 10px; color: #7D8293; margin-top: 2px; }

        /* БЫСТРЫЕ ДЕЙСТВИЯ */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .quick-action {
            background: #14161D;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 12px 4px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .quick-action:active { transform: scale(0.95); }
        .quick-action .icon { font-size: 22px; display: block; }
        .quick-action .label { font-size: 10px; color: #7D8293; margin-top: 2px; }
        .quick-action .badge {
            background: #00F0FF;
            color: #0B0C0F;
            font-size: 8px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 2px;
        }

        /* СПИСОК ВАКАНСИЙ */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-title h3 { font-size: 15px; font-weight: 600; }
        .section-title a { font-size: 12px; color: #7D8293; cursor: pointer; }

        .vacancy-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .vacancy-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #14161D;
            border-radius: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: 0.2s;
        }
        .vacancy-item:active { transform: scale(0.98); background: #1a1d28; }
        .vacancy-info { display: flex; align-items: center; gap: 12px; }
        .vacancy-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0;
            color: #0B0C0F;
        }
        .vacancy-icon.online { background: linear-gradient(135deg, #00F0FF, #0088FF); }
        .vacancy-icon.physical { background: linear-gradient(135deg, #FF6B6B, #EE5A24); }
        .vacancy-icon.both { background: linear-gradient(135deg, #8B5CF6, #6D28D9); }
        .vacancy-name { font-size: 14px; font-weight: 600; }
        .vacancy-sub { font-size: 11px; color: #7D8293; }
        .vacancy-salary { text-align: right; }
        .vacancy-salary .amount { font-size: 14px; font-weight: 600; }
        .vacancy-salary .city { font-size: 11px; color: #7D8293; }

        /* КНОПКА */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00F0FF, #0088FF);
            border: none;
            border-radius: 14px;
            color: #0B0C0F;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary:active { transform: scale(0.97); }

        /* ЗАГРУЗЧИК */
        .loader {
            text-align: center;
            color: #7D8293;
            padding: 60px 0;
        }
        .loader .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #14161D;
            border-top-color: #00F0FF;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* НАВИГАЦИЯ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0B0C0F;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            padding: 6px 0 10px;
            backdrop-filter: blur(12px);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 9px;
            color: #7D8293;
            cursor: pointer;
            padding: 4px 12px;
            background: transparent;
            border: none;
            font-family: inherit;
        }
        .nav-item .nav-icon { font-size: 20px; }
        .nav-item.active { color: #00F0FF; }

        /* ОШИБКА */
        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            color: #EF4444;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- Загрузчик -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Загрузка данных...</p>
        </div>

        <!-- Контент -->
        <div id="content" style="display: none;">
            <!-- ХЕДЕР -->
            <div class="header">
                <h1>JobBot</h1>
                <div class="header-actions">
                    <button class="header-btn" onclick="refreshData()">🔄</button>
                </div>
            </div>

            <!-- ПРОФИЛЬ -->
            <div class="profile-card" id="profileCard">
                <div class="name" id="userName">Загрузка...</div>
                <div class="detail" id="userPhone">📞 Загрузка...</div>
                <div class="detail" id="userCity">📍 Загрузка...</div>
                <span class="badge" id="userBadge">👤 Загрузка...</span>
            </div>

            <!-- СТАТИСТИКА -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="num" id="statVacancies">0</div>
                    <div class="label">Вакансий</div>
                </div>
                <div class="stat-item">
                    <div class="num" id="statApplications">0</div>
                    <div class="label">Откликов</div>
                </div>
                <div class="stat-item">
                    <div class="num" id="statSubscription">❌</div>
                    <div class="label">Подписка</div>
                </div>
            </div>

            <!-- БЫСТРЫЕ ДЕЙСТВИЯ -->
            <div class="quick-actions">
                <div class="quick-action" onclick="openInBot('find')">
                    <span class="icon">🔍</span>
                    <span class="label">Поиск</span>
                </div>
                <div class="quick-action" onclick="openInBot('applications')">
                    <span class="icon">📋</span>
                    <span class="label">Отклики</span>
                    <span class="badge" id="appBadge">0</span>
                </div>
                <div class="quick-action" onclick="openInBot('subscription')">
                    <span class="icon">💎</span>
                    <span class="label">Подписка</span>
                    <span class="badge" id="subBadge">FREE</span>
                </div>
                <div class="quick-action" onclick="openInBot('profile')">
                    <span class="icon">👤</span>
                    <span class="label">Профиль</span>
                </div>
            </div>

            <!-- ВАКАНСИИ -->
            <div class="section-title">
                <h3>🔥 Активные вакансии</h3>
                <a onclick="openInBot('find')">Смотреть все</a>
            </div>
            <div class="vacancy-list" id="vacancyList">
                <div style="text-align:center;color:#7D8293;padding:20px 0;">Загрузка вакансий...</div>
            </div>

            <button class="btn-primary" onclick="openInBot('full')">🚀 Открыть бота</button>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')">
            <span class="nav-icon">🏠</span> Главная
        </button>
        <button class="nav-item" onclick="openInBot('find')">
            <span class="nav-icon">📌</span> Вакансии
        </button>
        <button class="nav-item" onclick="openInBot('applications')">
            <span class="nav-icon">💬</span> Отклики
        </button>
        <button class="nav-item" onclick="openInBot('profile')">
            <span class="nav-icon">👤</span> Профиль
        </button>
    </div>

    <script>
        // ============================================================
        // 1. TELEGRAM WEBAPP
        // ============================================================
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ============================================================
        // 2. ПОЛУЧЕНИЕ ДАННЫХ ИЗ БОТА
        // ============================================================
        async function loadData() {
            try {
                // Получаем токен пользователя через WebApp
                const initData = tg ? tg.initData : '';

                // Отправляем запрос к боту
                const response = await fetch('/api/data', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-WebApp-Init-Data': initData
                    }
                });

                if (!response.ok) throw new Error('Ошибка загрузки');

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                renderData(data);
            } catch (error) {
                console.error('Ошибка:', error);
                // Показываем сообщение об ошибке
                document.getElementById('loader').innerHTML = `
                    <div class="error-box">
                        ❌ Не удалось загрузить данные<br>
                        <small>Проверьте подключение к боту</small>
                        <br><br>
                        <button onclick="loadData()" style="background:#00F0FF;border:none;padding:8px 20px;border-radius:8px;font-weight:700;cursor:pointer;">Повторить</button>
                    </div>
                `;
            }
        }

        // ============================================================
        // 3. ОТОБРАЖЕНИЕ ДАННЫХ
        // ============================================================
        function renderData(data) {
            // Прячем загрузчик
            document.getElementById('loader').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            const user = data.user || {};
            const stats = data.stats || {};
            const vacancies = data.vacancies || [];
            const applications = data.applications || [];
            const subscription = data.subscription || {};

            // Профиль
            document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('userPhone').textContent = `📞 ${user.phone || 'Не указан'}`;
            document.getElementById('userCity').textContent = `📍 ${user.city || 'Не указан'}`;

            // Бейдж
            const badge = document.getElementById('userBadge');
            if (user.is_banned) {
                badge.textContent = '🚫 Заблокирован';
                badge.className = 'badge banned';
            } else if (user.role === 'worker') {
                badge.textContent = '👤 Соискатель';
                badge.className = 'badge worker';
            } else if (user.role === 'employer') {
                badge.textContent = '🏢 Работодатель';
                badge.className = 'badge employer';
            } else {
                badge.textContent = '❌ Не зарегистрирован';
                badge.className = 'badge';
            }

            // Статистика
            document.getElementById('statVacancies').textContent = stats.vacancies_count || vacancies.length;
            document.getElementById('statApplications').textContent = stats.applications_count || applications.length;
            document.getElementById('statSubscription').textContent = subscription.is_active ? '✅' : '❌';

            // Бейджи
            document.getElementById('appBadge').textContent = stats.applications_count || 0;
            const subBadge = document.getElementById('subBadge');
            if (subscription.is_active) {
                subBadge.textContent = subscription.name || 'PRO';
                subBadge.style.background = '#F9CA24';
                subBadge.style.color = '#0B0C0F';
            } else {
                subBadge.textContent = 'FREE';
                subBadge.style.background = '#7D8293';
                subBadge.style.color = '#FFFFFF';
            }

            // Список вакансий
            const list = document.getElementById('vacancyList');
            list.innerHTML = '';

            if (vacancies.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#7D8293;padding:20px 0;">📭 Нет активных вакансий</div>';
                return;
            }

            vacancies.forEach(vac => {
                const item = document.createElement('div');
                item.className = 'vacancy-item';

                // Показываем полную информацию при клике
                item.onclick = () => {
                    const msg = `📌 ${vac.title}\n🏢 ID: ${vac.employer_id}\n💰 ${vac.salary}\n📍 ${vac.city}\n\n📝 ${vac.description || 'Описание отсутствует'}`;
                    if (tg) tg.showAlert(msg);
                    else alert(msg);
                };

                const iconMap = {
                    'online': '💻',
                    'physical': '🏢',
                    'both': '🔀'
                };
                const icon = iconMap[vac.type] || '📌';
                const iconClass = `vacancy-icon ${vac.type || 'online'}`;

                item.innerHTML = `
                    <div class="vacancy-info">
                        <div class="${iconClass}">${icon}</div>
                        <div>
                            <div class="vacancy-name">${vac.title}</div>
                            <div class="vacancy-sub">📍 ${vac.city || 'Удаленно'}</div>
                        </div>
                    </div>
                    <div class="vacancy-salary">
                        <div class="amount">${vac.salary}</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // ============================================================
        // 4. ИНТЕРАКЦИИ
        // ============================================================

        // Открыть функцию в боте
        function openInBot(action) {
            const messages = {
                'find': '🔍 Ищем вакансии...',
                'applications': '📋 Переходим к откликам...',
                'subscription': '💎 Открываем подписку...',
                'profile': '👤 Открываем профиль...',
                'full': '🚀 Открываем бота...'
            };

            if (tg) {
                tg.sendData(JSON.stringify({ action: action }));
                tg.showAlert(messages[action] || 'Выполняем действие...');
                tg.close(); // Закрываем приложение и переходим в бота
            } else {
                // Если вне Telegram — просто показываем уведомление
                alert(messages[action] || 'Действие выполнено');
                window.open('https://t.me/ваш_бот_username', '_blank');
            }
        }

        // Обновить данные
        function refreshData() {
            document.getElementById('content').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('loader').innerHTML = `
                <div class="spinner"></div>
                <p>Обновление данных...</p>
            `;
            if (tg) tg.showAlert('🔄 Данные обновляются...');
            setTimeout(loadData, 500);
        }

        // Переключение вкладок
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (tab === 'home') {
                document.querySelector('.nav-item:first-child').classList.add('active');
            }
        }

        // ============================================================
        // 5. ЗАПУСК
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Если есть данные от Telegram — сразу загружаем
            if (tg && tg.initData) {
                loadData();
            } else {
                // Если нет — пробуем загрузить через 1 секунду
                setTimeout(loadData, 1000);
            }
        });
    </script>

</body>
</html>
