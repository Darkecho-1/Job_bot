<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobBot App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 20px 0 30px;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #4a6cf7, #6a3de8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #8892a8;
            font-size: 14px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 400px;
            margin: 0 auto;
        }
        .menu-item {
            background: #1a1a2e;
            border-radius: 14px;
            padding: 18px 14px;
            text-align: center;
            border: 1px solid #2a2a44;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .menu-item:hover {
            background: #252545;
            transform: translateY(-2px);
            border-color: #4a6cf7;
        }
        .menu-item .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 8px;
        }
        .menu-item .label {
            font-size: 13px;
            color: #ccd6f6;
        }
        .menu-item .badge {
            background: #4a6cf7;
            color: white;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 6px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            border-top: 1px solid #2a2a44;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .nav-item {
            text-align: center;
            font-size: 12px;
            color: #8892a8;
            cursor: pointer;
            padding: 4px 12px;
        }
        .nav-item.active {
            color: #4a6cf7;
        }
        .nav-item .nav-icon {
            font-size: 20px;
            display: block;
        }
        .profile-card {
            background: #1a1a2e;
            border-radius: 14px;
            padding: 20px;
            margin: 10px 0 20px;
            border: 1px solid #2a2a44;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .profile-card .name {
            font-size: 18px;
            font-weight: 600;
        }
        .profile-card .detail {
            color: #8892a8;
            font-size: 13px;
            margin-top: 4px;
        }
        .profile-card .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
            background: #4a6cf7;
            color: white;
        }
        .btn {
            background: #4a6cf7;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: background 0.3s;
            max-width: 400px;
            margin: 10px auto;
            display: block;
        }
        .btn:hover {
            background: #3a5cd9;
        }
        @media (max-width: 480px) {
            .menu-grid { gap: 8px; }
            .menu-item { padding: 14px 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 JobBot</h1>
        <p>Платформа для поиска работы</p>
    </div>

    <div class="profile-card" id="profileCard">
        <div class="name" id="userName">Пользователь</div>
        <div class="detail" id="userCity">📍 Город не указан</div>
        <div class="detail" id="userRole">🎯 Соискатель</div>
        <span class="status" id="userStatus">Активен</span>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="showAlert('🔍 Поиск вакансий')">
            <span class="icon">🔍</span>
            <span class="label">Найти вакансии</span>
        </div>
        <div class="menu-item" onclick="showAlert('📋 Мои отклики')">
            <span class="icon">📋</span>
            <span class="label">Мои отклики</span>
            <span class="badge">3</span>
        </div>
        <div class="menu-item" onclick="showAlert('💎 Подписка')">
            <span class="icon">💎</span>
            <span class="label">Подписка</span>
            <span class="badge">Premium</span>
        </div>
        <div class="menu-item" onclick="showAlert('⚙️ Настройки')">
            <span class="icon">⚙️</span>
            <span class="label">Настройки</span>
        </div>
    </div>

    <button class="btn" onclick="showAlert('🔄 Обновить профиль')">🔄 Обновить профиль</button>

    <div class="bottom-nav">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            Главная
        </div>
        <div class="nav-item" onclick="showAlert('📋 Вакансии')">
            <span class="nav-icon">📌</span>
            Вакансии
        </div>
        <div class="nav-item" onclick="showAlert('💬 Чаты')">
            <span class="nav-icon">💬</span>
            Чаты
        </div>
        <div class="nav-item" onclick="showAlert('👤 Профиль')">
            <span class="nav-icon">👤</span>
            Профиль
        </div>
    </div>

    <script>
        function showAlert(message) {
            alert('📱 ' + message + '\n\nДанная функция будет доступна в следующей версии приложения!');
        }

        // Имитация загрузки данных пользователя из Telegram WebApp
        document.addEventListener('DOMContentLoaded', function() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    const user = window.Telegram.WebApp.initDataUnsafe?.user || {};
                    if (user.first_name) {
                        document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                        document.getElementById('userCity').textContent = '📍 ' + (user.city || 'Город не указан');
                    }
                    // Показываем, что WebApp готов
                    window.Telegram.WebApp.ready();
                }
            } catch (e) {
                console.log('WebApp не инициализирован');
            }
        });
    </script>

</body>
</html>
